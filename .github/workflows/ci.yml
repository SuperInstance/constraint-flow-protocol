name: CI
on: [push, pull_request]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Syntax check
        run: python3 -m py_compile cfp.py
      - name: Import check
        run: python3 -c "from cfp import encode_cfp, decode_cfp, ConstraintManifold, FluxVM; print('CFP library imports OK')"
      - name: Protocol flow
        run: python3 -c "
from cfp import ConstraintManifold
m = ConstraintManifold()
assert m.structural_distance(m) == 0.0
print('Manifold self-distance: 0.0 OK')
"
